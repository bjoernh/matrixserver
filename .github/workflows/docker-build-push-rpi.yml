name: Build and Push RPi (ARM64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/matrixserver-rpi

jobs:
  build-and-push-rpi:
    name: Build DEB and Push to GHCR (ARM64)
    runs-on: [self-hosted, linux, ARM64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential cmake git pkg-config \
            libeigen3-dev libboost-thread-dev libboost-log-dev \
            libboost-system-dev libboost-regex-dev libboost-chrono-dev \
            libboost-date-time-dev libboost-filesystem-dev libboost-atomic-dev \
            libboost-program-options-dev libasound2-dev libprotobuf-dev \
            protobuf-compiler libimlib2-dev libftdi1-dev

      - name: Build and install wiringPi natively
        run: |
          git clone https://github.com/WiringPi/WiringPi.git
          cd WiringPi && sudo ./build && cd .. && rm -rf WiringPi

      - name: Mock Raspberry Pi detection for CMake
        run: sudo mkdir -p /boot && sudo touch /boot/LICENCE.broadcom

      - name: Clean pre-compiled submodules
        run: make -C renderer/RGBMatrixRenderer/rpi-rgb-led-matrix/lib clean || true

      - name: Compile Project
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DHARDWARE_BACKEND=FPGA_RPISPI ..
          make -j$(nproc)

      - name: Run Tests
        run: |
          cd build
          ./tests/testAll

      - name: Create Debian Package Workspace
        run: |
          PROJECT_VERSION=$(grep -oP 'project\([^ ]+ VERSION \K[0-9.]+' CMakeLists.txt)
          if [ -z "$PROJECT_VERSION" ]; then echo "Failed to extract version"; exit 1; fi

          mkdir -p deb-workspace/usr/local/bin
          mkdir -p deb-workspace/usr/local/lib

          # Copy Binaries
          cp build/MainMenu/MainMenu deb-workspace/usr/local/bin/
          cp build/server_hardware/matrix_server deb-workspace/usr/local/bin/

          # Copy Shared Libraries
          find build/renderer -name '*.so' -exec cp {} deb-workspace/usr/local/lib/ \;

          # Copy WiringPi Dynamic Libraries
          cp /usr/local/lib/libwiringPi.so* deb-workspace/usr/local/lib/
          cp /usr/local/lib/libwiringPiDev.so* deb-workspace/usr/local/lib/

          mkdir -p deb-workspace/DEBIAN
          cat <<EOF > deb-workspace/DEBIAN/control
          Package: matrixserver-rpi
          Version: ${PROJECT_VERSION}
          Section: base
          Priority: optional
          Architecture: arm64
          Maintainer: Bjoern Hauffe<oss@64b.de>
          Description: LEDCube matrixserver Raspberry Pi binaries
          Depends: libboost-thread1.83.0, libboost-log1.83.0, libboost-system1.83.0, libboost-regex1.83.0, libboost-chrono1.83.0, libboost-date-time1.83.0, libboost-filesystem1.83.0, libboost-atomic1.83.0, libboost-program-options1.83.0, libasound2t64, libprotobuf32t64, libimlib2t64, libftdi1-2
          EOF

      - name: Build Debian Package
        run: |
          PROJECT_VERSION=$(grep -oP 'project\([^ ]+ VERSION \K[0-9.]+' CMakeLists.txt)
          dpkg-deb --build deb-workspace "matrixserver-rpi_${PROJECT_VERSION}_arm64.deb"

      - name: Upload Debian Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrixserver-rpi-arm64
          path: matrixserver-rpi_*.deb

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.arm64.release
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
