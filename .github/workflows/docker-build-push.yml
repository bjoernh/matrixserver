name: Build and Push Simulator (AMD64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/matrixserver-simulator

jobs:
  build-and-push:
    name: Build Simulator DEB and Push to GHCR (AMD64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential cmake git pkg-config \
            libeigen3-dev libboost-all-dev libasound2-dev \
            libprotobuf-dev protobuf-compiler libimlib2-dev

      - name: Compile Project
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)

      - name: Run Tests
        run: |
          cd build
          make testAll
          ./tests/testAll

      - name: Create Debian Package Workspace
        run: |
          PROJECT_VERSION=$(grep -oP 'project\([^ ]+ VERSION \K[0-9.]+' CMakeLists.txt)
          if [ -z "$PROJECT_VERSION" ]; then echo "Failed to extract version"; exit 1; fi

          mkdir -p deb-workspace/usr/local/bin
          cp build/server_simulator/matrix_server_simulator deb-workspace/usr/local/bin/

          mkdir -p deb-workspace/DEBIAN
          cat <<EOF > deb-workspace/DEBIAN/control
          Package: matrixserver-simulator
          Version: ${PROJECT_VERSION}
          Section: base
          Priority: optional
          Architecture: amd64
          Maintainer: Bjoern Hauffe<oss@64b.de>
          Description: LEDCube matrixserver & matrixapplication library (Simulator)
          Depends: libboost-thread1.83.0, libboost-log1.83.0, libboost-system1.83.0, libboost-regex1.83.0, libboost-chrono1.83.0, libboost-date-time1.83.0, libboost-filesystem1.83.0, libboost-atomic1.83.0, libboost-program-options1.83.0, libasound2t64, libprotobuf32t64, libimlib2t64
          EOF

      - name: Build Debian Package
        run: |
          PROJECT_VERSION=$(grep -oP 'project\([^ ]+ VERSION \K[0-9.]+' CMakeLists.txt)
          dpkg-deb --build deb-workspace "matrixserver-simulator_${PROJECT_VERSION}_amd64.deb"

      - name: Upload Debian Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrixserver-simulator
          path: matrixserver-simulator_*.deb

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
